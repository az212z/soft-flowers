<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>الصفحة غير موجودة · الأزهار الناعمة</title>
<meta name="theme-color" content="#FBEDE9" />
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/css/style.css" />
<style>
  .nf { min-height: 100dvh; display: grid; place-items: center; text-align: center;
        background: linear-gradient(170deg, var(--bg-2), var(--bg)); padding: var(--s5); }
  .nf b { font-family: var(--font-display); font-size: clamp(4rem, 18vw, 8rem); color: var(--peach-deep); display: block; line-height: 1; }
  .nf h1 { font-size: clamp(1.4rem, 5vw, 2rem); margin: var(--s4) 0 var(--s3); }
  .nf p { color: var(--ink-soft); margin-bottom: var(--s6); }
</style>
</head>
<body>
  <main class="nf">
    <div>
      <img src="favicon.svg" alt="الأزهار الناعمة" width="64" height="64" style="margin-inline:auto" />
      <b>٤٠٤</b>
      <h1>هذه الصفحة لم نجدها</h1>
      <p>ربما تغيّر الرابط أو حُذفت الصفحة. لا بأس، نعيدك لباقاتنا.</p>
      <a class="btn btn-primary" href="/soft-flowers/">العودة للرئيسية</a>
    </div>
  </main>
</body>
</html>
